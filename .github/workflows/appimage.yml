name: AppImage

# Builds the Linux AppImage. Runs on pushes/PRs for a build-health check and,
# when a v* tag is pushed, attaches the AppImage to the GitHub release.
on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/appimage.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/appimage.yml'
  workflow_dispatch:

concurrency:
  group: appimage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Needed only for the tag-triggered release upload step below.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the engines field (>=22.13.0) in package.json.
          node-version: '22'
          cache: npm

      - name: Platform evidence
        run: node -p "process.platform + '-' + process.arch"

      - run: npm ci

      - name: Build AppImage
        # APPIMAGE_EXTRACT_AND_RUN lets electron-builder's bundled appimagetool
        # run without libfuse2, which isn't installed on the GitHub runners.
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: npm run dist:linux

      - name: List build output
        run: ls -lh dist/*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-linux
          if-no-files-found: error
          path: dist/*.AppImage

      - name: Attach AppImage to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
