name: Release

on:
  push:
    tags: ['v*']
    branches: ['feat/signpath-windows-signing']  # TEMP: validate signing on this branch; remove before merge
  workflow_dispatch: {}  # manual runs build+sign only (no GitHub release) — use to validate signing

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Platform evidence
        run: node -p "process.platform + '-' + process.arch"
      - run: npm ci
      - run: npm run dist:${{ matrix.target }}

      # macOS: upload installers as-is (SignPath does not sign macOS)
      - name: Upload macOS artifacts
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: token-monitor-mac
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip

      # Windows: upload unsigned installer, code-sign via SignPath, upload the signed result
      - name: Upload unsigned Windows installer
        if: matrix.target == 'win'
        id: upload-unsigned-win
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-installer
          if-no-files-found: error
          path: dist/*.exe
      - name: Code-sign Windows installer (SignPath)
        if: matrix.target == 'win'
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 8bf2856b-5fb0-4c78-ba99-90931fcce837
          project-slug: token-monitor
          # TODO: switch to release-signing once the Release certificate (currently CSR PENDING) is issued
          signing-policy-slug: test-signing
          artifact-configuration-slug: initial
          github-artifact-id: ${{ steps.upload-unsigned-win.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed
      - name: Upload signed Windows installer
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: token-monitor-win
          if-no-files-found: error
          path: dist/signed/*.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: token-monitor-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
          body_path: .github/RELEASE_TEMPLATE.md
